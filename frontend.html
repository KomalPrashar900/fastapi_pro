<!DOCTYPE html>
<html>
<head>
    <title>Product Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            background: linear-gradient(-45deg, #667eea, #764ba2, #6dd5ed, #2193b0);
            background-size: 300% 300%;
            animation: gradientMove 12s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            display: flex;
            gap: 30px;
        }

        .card {
            width: 400px;
            padding: 30px;
            border-radius: 20px;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(20px);
            color: white;
        }

        h1, h2 {
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 6px 0;
            border-radius: 10px;
            border: none;
            background: rgba(255,255,255,0.2);
            color: white;
        }

        input::placeholder {
            color: rgba(255,255,255,0.7);
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-add { background: #00c9a7; }
        .btn-update { background: #f7971e; }
        .btn-delete { background: #ff416c; }
        .btn-get { background: #4facfe; }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            padding: 8px;
            margin: 5px 0;
            background: rgba(255,255,255,0.2);
            border-radius: 8px;
        }

        .message {
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="container">

    <!-- LEFT: Controls -->
    <div class="card">
        <h1>🚀 Product Manager</h1>

        <h2>➕ Add</h2>
        <input id="addId" placeholder="ID">
        <input id="addName" placeholder="Name">
        <input id="addPrice" placeholder="Price">
        <button class="btn-add" onclick="addProduct()">Add</button>

        <h2>✏ Update</h2>
        <input id="updateId" placeholder="ID">
        <input id="updateName" placeholder="Name">
        <input id="updatePrice" placeholder="Price">
        <button class="btn-update" onclick="updateProduct()">Update</button>

        <h2>🗑 Delete</h2>
        <input id="deleteId" placeholder="ID">
        <button class="btn-delete" onclick="deleteProduct()">Delete</button>

        <h2>📦 Load Products</h2>
        <button class="btn-get" onclick="getProducts()">Get Products</button>

        <div class="message" id="message"></div>
    </div>

    <!-- RIGHT: Product List -->
    <div class="card">
        <h2>📋 Products</h2>
        <ul id="productList"></ul>
    </div>

</div>

<script>
const BASE_URL = "http://127.0.0.1:8000";

function showMessage(msg) {
    document.getElementById("message").innerText = msg;
}

async function getProducts() {
    const res = await fetch(`${BASE_URL}/orders`);
    const data = await res.json();

    const list = document.getElementById("productList");
    list.innerHTML = "";

    data.forEach(p => {
        const li = document.createElement("li");
        li.innerText = `${p.id} - ${p.name} - ₹${p.price}`;
        list.appendChild(li);
    });
}

async function addProduct() {
    const id = addId.value;
    const name = addName.value;
    const price = addPrice.value;

    await fetch(`${BASE_URL}/products`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ id: Number(id), name, price: Number(price) })
    });

    showMessage("✅ Added");
    getProducts();
}

async function updateProduct() {
    const id = updateId.value;
    const name = updateName.value;
    const price = updatePrice.value;

    await fetch(`${BASE_URL}/products?id=${id}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ id: Number(id), name, price: Number(price) })
    });

    showMessage("✏ Updated");
    getProducts();
}

async function deleteProduct() {
    const id = deleteId.value;

    await fetch(`${BASE_URL}/products?id=${id}`, {
        method: "DELETE"
    });

    showMessage("🗑 Deleted");
    getProducts();
}
</script>

</body>
</html>
